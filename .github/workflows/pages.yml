name: Pages

# Pubblica la landing (site/) su GitHub Pages. `configure-pages` con
# enablement:true abilita Pages da solo al primo run, se i permessi Actions
# lo consentono; altrimenti abilitala una volta in Settings → Pages
# (Source: GitHub Actions).

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
