name: CI

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  pull_request:

# Least privilege: di default sola lettura; solo il job che crea la release scrive.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install nomad (for integration tests)
        run: |
          curl -sL https://releases.hashicorp.com/nomad/1.9.5/nomad_1.9.5_linux_amd64.zip -o nomad.zip
          sudo unzip -o nomad.zip -d /usr/local/bin
          nomad version
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # crea/aggiorna la GitHub Release con il .vsix
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }
      - run: npx @vscode/vsce package --no-dependencies
      - name: Upload .vsix to the release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

  # Pubblicazione automatica sugli store. Richiede i secret VSCE_PAT
  # (Marketplace, publisher deve combaciare con package.json) e, opzionale,
  # OVSX_PAT (Open VSX). Se OVSX_PAT non e' configurato, quello step si salta.
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    environment: marketplace
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish --no-dependencies
        env:
          OVSX_PAT: ${{ env.OVSX_PAT }}
